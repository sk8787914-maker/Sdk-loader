name: NewBlackbox Android Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'NewBlackbox/**'
      - '.github/workflows/newblackbox-android-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'NewBlackbox/**'
      - '.github/workflows/newblackbox-android-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK/AAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NewBlackbox

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses and install NDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "ndk;29.0.13846066"

      - name: Build project
        run: ./gradlew --stacktrace --info clean :app:assembleDebug :Bcore:assembleDebug :black-reflection:assemble :compiler:assemble

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newblackbox-apk
          path: |
            NewBlackbox/**/build/outputs/apk/**/*.apk
            NewBlackbox/**/build/outputs/**/*.aar
          if-no-files-found: warn
